# OSI (Open Semantic Interchange) version of the flights example
# Spec: https://github.com/open-semantic-interchange/OSI (v0.1.1)
#
# This is the OSI-compliant equivalent of flights.yml.
# Use from_osi_yaml() to load this into BSL:
#
#   from boring_semantic_layer.osi import from_osi_yaml
#   models = from_osi_yaml("flights_osi.yaml", tables=tables)

version: "0.1.1"

semantic_model:
  - name: flights_analytics
    description: Flight data analytics model with carriers, aircraft, and airports
    ai_context:
      instructions: >
        Use this model for analyzing US domestic flight data including
        delays, distances, carriers, aircraft, and airports.
      examples:
        - "What are the top 10 carriers by total flights?"
        - "What is the average flight distance by origin airport?"
        - "Show me the distribution of departure delays"

    datasets:
      # ----------------------------------------------------------------
      # Carriers
      # ----------------------------------------------------------------
      - name: carriers
        source: carriers_tbl
        primary_key: [code]
        description: Airline carrier information
        fields:
          - name: code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: code
            dimension:
              is_time: false
            description: Airline carrier code

          - name: name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: name
            dimension:
              is_time: false
            description: Full airline name

          - name: nickname
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: nickname
            dimension:
              is_time: false

      # ----------------------------------------------------------------
      # Aircraft Models
      # ----------------------------------------------------------------
      - name: aircraft_models
        source: aircraft_models_tbl
        primary_key: [aircraft_model_code]
        description: Aircraft model specifications
        fields:
          - name: aircraft_model_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: aircraft_model_code
            dimension:
              is_time: false

          - name: manufacturer
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: manufacturer
            dimension:
              is_time: false

          - name: model
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: model
            dimension:
              is_time: false

          - name: aircraft_type_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: aircraft_type_id
            dimension:
              is_time: false

          - name: aircraft_engine_type_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: aircraft_engine_type_id
            dimension:
              is_time: false

          - name: aircraft_category_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: aircraft_category_id
            dimension:
              is_time: false

      # ----------------------------------------------------------------
      # Aircraft (Individual Planes)
      # ----------------------------------------------------------------
      - name: aircraft
        source: aircraft_tbl
        primary_key: [tail_num]
        description: Individual aircraft registry
        fields:
          - name: tail_num
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: tail_num
            dimension:
              is_time: false

          - name: aircraft_serial
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: aircraft_serial
            dimension:
              is_time: false

          - name: aircraft_model_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: aircraft_model_code
            dimension:
              is_time: false

          - name: aircraft_engine_code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: aircraft_engine_code
            dimension:
              is_time: false

          - name: aircraft_type_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: aircraft_type_id
            dimension:
              is_time: false

      # ----------------------------------------------------------------
      # Airports
      # ----------------------------------------------------------------
      - name: airports
        source: airports_tbl
        primary_key: [code]
        description: Airport locations and information
        ai_context:
          synonyms:
            - "airport"
            - "airfield"
            - "aerodrome"
        fields:
          - name: code
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: code
            dimension:
              is_time: false

          - name: city
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: city
            dimension:
              is_time: false

          - name: county
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: county
            dimension:
              is_time: false

          - name: state
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: state
            dimension:
              is_time: false

          - name: full_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: full_name
            dimension:
              is_time: false

          - name: latitude
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: latitude
            dimension:
              is_time: false

          - name: longitude
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: longitude
            dimension:
              is_time: false

          - name: elevation
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: elevation
            dimension:
              is_time: false

      # ----------------------------------------------------------------
      # Flights
      # ----------------------------------------------------------------
      - name: flights
        source: flights_tbl
        description: Flight data with origin, destination, and metrics
        ai_context:
          synonyms:
            - "flight records"
            - "air travel"
            - "flight segments"
        fields:
          - name: origin
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: origin
            dimension:
              is_time: false
            description: Origin airport code
            ai_context:
              synonyms:
                - "departure airport"
                - "from"

          - name: destination
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: destination
            dimension:
              is_time: false
            description: Destination airport code
            ai_context:
              synonyms:
                - "arrival airport"
                - "to"

          - name: carrier
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: carrier
            dimension:
              is_time: false

          - name: tail_num
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: tail_num
            dimension:
              is_time: false

          - name: dep_time
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: dep_time
            dimension:
              is_time: false
            description: Departure timestamp

          - name: arr_time
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: arr_time
            dimension:
              is_time: true
            description: Arrival timestamp
            custom_extensions:
              - vendor_name: COMMON
                data: '{"is_event_timestamp": false, "smallest_time_grain": "TIME_GRAIN_DAY"}'

          - name: distance
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: distance
            dimension:
              is_time: false
            description: Flight distance in miles

    relationships:
      - name: flights_to_carriers
        from: flights
        to: carriers
        from_columns: [carrier]
        to_columns: [code]

      - name: aircraft_to_aircraft_models
        from: aircraft
        to: aircraft_models
        from_columns: [aircraft_model_code]
        to_columns: [aircraft_model_code]

      - name: flights_to_aircraft
        from: flights
        to: aircraft
        from_columns: [tail_num]
        to_columns: [tail_num]

      - name: flights_to_origin_airport
        from: flights
        to: airports
        from_columns: [origin]
        to_columns: [code]

    metrics:
      - name: carrier_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(*)
        description: Number of carriers

      - name: model_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(*)
        description: Number of aircraft models

      - name: avg_seats
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(aircraft_models.seats)
        description: Average number of seats

      - name: aircraft_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(*)
        description: Number of aircraft

      - name: airport_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(*)
        description: Number of airports

      - name: avg_elevation
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(airports.elevation)
        description: Average airport elevation

      - name: flight_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(*)
        description: Total number of flights
        ai_context:
          synonyms:
            - "number of flights"
            - "total flights"

      - name: total_distance
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(flights.distance)
        description: Total distance flown

      - name: avg_distance
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(flights.distance)
        description: Average flight distance

      - name: max_distance
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: MAX(flights.distance)
        description: Maximum flight distance

      - name: avg_delay
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: AVG(flights.dep_delay)
        description: Average departure delay

      - name: max_delay
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: MAX(flights.dep_delay)
        description: Maximum departure delay
