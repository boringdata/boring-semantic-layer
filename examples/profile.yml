# Example local profile.yml file
# Place this file in your project root directory

# DuckDB with parquet files automatically loaded as views
# This demonstrates the tables feature for DuckDB profiles
my_flights_db:
  type: duckdb
  database: ":memory:"
  # Automatically load parquet files as DuckDB views
  tables:
    flights_tbl:
      source: "https://pub-a45a6a332b4646f2a6f44775695c64df.r2.dev/flights.parquet"
    carriers_tbl:
      source: "https://pub-a45a6a332b4646f2a6f44775695c64df.r2.dev/carriers.parquet"
  # Note: You can also use local files:
  # tables:
  #   my_table: "path/to/local/file.parquet"

# Development database with local DuckDB
dev_db:
  type: duckdb
  database: dev.db

# In-memory DuckDB for testing
test_db:
  type: duckdb
  database: ":memory:"

# Production Postgres database using environment variables
prod_db:
  type: postgres
  host: ${POSTGRES_HOST}
  port: 5432
  database: ${POSTGRES_DB}
  user: ${POSTGRES_USER}
  password: ${POSTGRES_PASSWORD}

# Snowflake connection
snowflake_prod:
  type: snowflake
  account: ${SNOWFLAKE_ACCOUNT}
  user: ${SNOWFLAKE_USER}
  password: ${SNOWFLAKE_PASSWORD}
  database: ${SNOWFLAKE_DATABASE}
  warehouse: ${SNOWFLAKE_WAREHOUSE}
  schema: PUBLIC
