name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

jobs:
  # Run the test suite with and without the xorq extra. The no-xorq leg
  # verifies xorq is truly optional (its tests skip, not error).
  test:
    name: Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: full
            sync: uv sync --all-extras
            pytest_args: ""
          - name: no-xorq
            sync: uv sync --all-extras --no-extra xorq --no-extra examples
            pytest_args: --ignore=src/boring_semantic_layer/tests/integration
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies (${{ matrix.name }})
        run: ${{ matrix.sync }}

      - name: Verify import works
        run: uv run python -c "import boring_semantic_layer; print('import OK')"

      - name: Run tests
        run: uv run pytest ${{ matrix.pytest_args }}

  # Build examples, docs, and skills (require the full env incl. Node).
  build:
    name: Build (examples + docs + skills)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: docs/web/package-lock.json

      - name: Install dependencies
        run: |
          uv sync --all-extras
          cd docs/web && npm ci

      - name: Run examples
        run: make examples

      - name: Build docs
        run: make docs-build

      - name: Check skills are up to date
        run: make skills-check

      - name: Upload docs artifact
        if: github.event_name == 'release'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/web/dist

  # Deploy docs to GitHub Pages (only on release - keep docs in sync with PyPI package)
  deploy-docs:
    name: Deploy Docs
    if: github.event_name == 'release'
    needs: [test, build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Release to PyPI (only on GitHub release)
  release-pypi:
    name: Release to PyPI
    if: github.event_name == 'release'
    needs: [test, build]
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build package
        run: uv build

      - name: Test wheel installation in clean environment
        run: |
          python -m venv test_env
          test_env/bin/pip install dist/*.whl
          test_env/bin/python -c "import boring_semantic_layer; print('✓ Successfully imported boring-semantic-layer')"

      - name: Run tests with installed package
        run: uv run pytest

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always

      - name: Cleanup temporary artifacts
        if: always()
        run: |
          rm -rf test_env dist
